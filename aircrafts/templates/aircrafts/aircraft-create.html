{% extends 'base.html' %}
{% block title %}Add Aircraft - SkyArchive{% endblock %}

{% block content %}
    <div class="card card-custom p-4">
    <h1 class="mb-4">Add Aircraft</h1>

        <form action="" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Create</button>
            <a href="{% url 'aircraft_list' %}" class="btn btn-outline-light">Cancel</a>
        </form>
    </div>
{% endblock %}
