{% extends 'base.html' %}

{% block title %}Delete Aircraft - SkyArchive{% endblock %}

{% block content %}
    <div class="card card-custom p-4">
        <h1 class="mb-4">Delete {{ aircraft.name }}</h1>
        <p class="text-warning">Are you sure you want to delete this aircraft?</p>
        <form action="" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-danger">Confirm Delete</button>
            <a href="{% url 'aircraft_details' pk=aircraft.pk %}" class="btn btn-outline-light">Cancel</a>
        </form>
    </div>
{% endblock %}
