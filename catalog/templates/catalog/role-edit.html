{% extends 'base.html' %}

{% block title %}Edit Role - SkyArchive{% endblock %}

{% block content %}
    <div class="card card-custom p-4">
        <h1 class="mb-4">Edit {{ role.name }}</h1>
        <form action="" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-warning">Save Changes</button>
            <a href="{% url 'role_details' role.pk %}" class="btn btn-outline-light">Cancel</a>
        </form>
    </div>
{% endblock %}
