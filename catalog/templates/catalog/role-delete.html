{% extends 'base.html' %}
{% block title %}Role Delete - SkyArchive{% endblock %}

{% block content %}
    <div class="card card-custom p-4">
        <h1 class="mb-4">Delete {{ role.name }}</h1>
        <p class="text-warning">Are you sure you want to delete this role?</p>
        <form method="post" action="">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-danger">Confirm Delete</button>
            <a href="{% url 'role_details' role.pk %}" class="btn btn-outline-light">Cancel</a>
        </form>
    </div>
{% endblock %}
