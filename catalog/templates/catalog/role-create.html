{% extends 'base.html' %}
{% block title %}Add Role - SkyArchive{% endblock %}

{% block content %}
    <div class="card card-custom p-4">
        <h1 class="mb-4">Add Role</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Create</button>
            <a href="{% url 'role_list' %}" class="btn btn-outline-light">Cancel</a>
        </form>
    </div>
{% endblock %}
